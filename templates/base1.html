<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>{% block title %}3alemni{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .iphone {
            width: 375px;
            height: 812px;
            background: #000;
            border-radius: 55px;
            padding: 15px;
            box-shadow: 0 0 0 2px #333,
                        0 0 0 6px #1a1a1a,
                        0 30px 80px rgba(0,0,0,0.8);
            position: relative;
        }

        .iphone-screen {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #1c1c3a 0%, #2d1b69 100%);
            border-radius: 44px;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
        }

        /* Custom scroll */
        .iphone-screen::-webkit-scrollbar {
            width: 3px;
        }
        .iphone-screen::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
        }
        .iphone-screen::-webkit-scrollbar-thumb {
            background: #4facfe;
            border-radius: 3px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 25px 5px;
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            position: sticky;
            top: 0;
            background: transparent;
            z-index: 10;
        }

        .notch {
            width: 120px;
            height: 30px;
            background: #000;
            border-radius: 0 0 20px 20px;
            margin: 0 auto;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
        }

        /* Contenu principal */
        .phone-content {
            padding: 0 0 80px 0;
        }

        /* Bouton retour */
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 6px 12px;
            color: white;
            font-size: 0.7rem;
            text-decoration: none;
            margin-bottom: 15px;
        }

        .back-button:hover {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        /* Messages flash */
        .flash-message {
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            margin-bottom: 10px;
            text-align: center;
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>

<div class="iphone">
    <div class="iphone-screen">
        <div class="notch"></div>

        <div class="status-bar">
            <span id="liveTime">9:41</span>
            <span style="width:120px"></span>
            <span>
                <i class="fas fa-signal"></i>
                <i class="fas fa-wifi ms-1"></i>
                <i class="fas fa-battery-full ms-1"></i>
            </span>
        </div>

        <div class="phone-content">
            {% if messages %}
                {% for message in messages %}
                    <div class="flash-message">{{ message }}</div>
                {% endfor %}
            {% endif %}

            {% block phone_content %}{% endblock %}
        </div>

    </div>
</div>

<script>
    function updateTime() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const timeElem = document.getElementById('liveTime');
        if (timeElem) timeElem.textContent = `${hours}:${minutes}`;
    }
    updateTime();
    setInterval(updateTime, 1000);

    // Disparition auto des messages
    setTimeout(() => {
        document.querySelectorAll('.flash-message').forEach(msg => {
            msg.style.opacity = '0';
            setTimeout(() => msg.remove(), 300);
        });
    }, 3000);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
