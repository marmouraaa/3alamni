<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}3alemni{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bordeaux: #8B0000;
            --rouge: #C41E3A;
            --marron: #5C1A1A;
            --bg: #FFF5F5;
            --text: #2C0A0A;
            --card: #FFFFFF;
            --border: #F0D0D0;
            --light: #FAF0F0;
            --gradient: linear-gradient(135deg, #8B0000, #C41E3A);
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .btn-primary-custom {
            background: var(--gradient);
            border: none;
            border-radius: 12px;
            padding: 12px 25px;
            color: white;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.3);
        }

        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 0, 0, 0.4);
            color: white;
        }

        .card-custom {
            background: var(--card);
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(139, 0, 0, 0.08);
            padding: 25px;
        }

        .badge-bordeaux {
            background: var(--gradient);
            color: white;
            border-radius: 8px;
            padding: 4px 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .form-control-custom {
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 12px 15px;
            font-size: 0.9rem;
            transition: all 0.3s;
            background: var(--light);
        }

        .form-control-custom:focus {
            border-color: var(--bordeaux);
            box-shadow: 0 0 0 3px rgba(139, 0, 0, 0.1);
            outline: none;
            background: white;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--bordeaux);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 2px;
            background: var(--gradient);
            border-radius: 2px;
        }

        /* Alerts */
        .alert-custom {
            border-radius: 12px;
            border: none;
            padding: 12px 20px;
            font-size: 0.9rem;
        }

        .alert-success-custom {
            background: #FFF0F0;
            color: var(--bordeaux);
            border-left: 4px solid var(--bordeaux);
        }

        .alert-danger-custom {
            background: #FFF0F0;
            color: var(--rouge);
            border-left: 4px solid var(--rouge);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--bordeaux);
            border-radius: 3px;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    {% if messages %}
        <div class="position-fixed top-0 end-0 p-3" style="z-index: 9999">
            {% for message in messages %}
                <div class="alert alert-dismissible fade show alert-custom
                    {% if message.tags == 'success' %}alert-success-custom
                    {% else %}alert-danger-custom{% endif %}">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        </div>
    {% endif %}

    {% block content %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
