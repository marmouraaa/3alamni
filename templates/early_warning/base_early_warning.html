<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3alemni - Early Warning</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    {% block extra_css %}{% endblock %}
    <style>
        body { font-family: 'Poppins', sans-serif; background: #FFF5F5; }
        .navbar { background: #8B0000; }
        .navbar-brand, .nav-link { color: white !important; }
        .btn-primary { background: #C41E3A; border: none; }
        .btn-primary:hover { background: #8B0000; }
        .card-header { background: #8B0000; color: white; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'early_warning:dashboard' %}">
                <i class="fas fa-exclamation-triangle"></i> 3alemni - Early Warning
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="{% url 'early_warning:dashboard' %}"><i class="fas fa-chart-line"></i> Dashboard</a>
                    <a class="nav-link" href="{% url 'early_warning:import_csv' %}"><i class="fas fa-upload"></i> Importer</a>
                    <a class="nav-link" href="{% url 'early_warning:alerts_list' %}"><i class="fas fa-bell"></i> Alertes</a>
                    <a class="nav-link" href="{% url 'early_warning:threshold_config' %}"><i class="fas fa-sliders-h"></i> Config</a>
                </div>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
