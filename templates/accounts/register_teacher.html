{% extends 'base.html' %}
{% block title %}Inscription Professeur - 3alemni{% endblock %}

{% block extra_css %}
<style>
    body {
        background: linear-gradient(135deg, #FFF5F5 0%, #F0D0D0 100%);
        padding: 40px 20px;
    }
    
    .register-container {
        max-width: 600px;
        margin: 0 auto;
    }
    
    .register-card {
        background: white;
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 20px 60px rgba(139, 0, 0, 0.15);
    }
    
    .register-header {
        text-align: center;
        margin-bottom: 30px;
    }
    
    .register-header h1 {
        color: #8B0000;
        font-size: 1.8rem;
        margin-bottom: 10px;
    }
    
    .register-header p {
        color: #666;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group label {
        display: block;
        font-weight: 600;
        color: #5C1A1A;
        margin-bottom: 8px;
        font-size: 0.9rem;
    }
    
    .form-group input, .form-group select {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #F0D0D0;
        border-radius: 12px;
        font-size: 0.9rem;
        background: #FFF5F5;
    }
    
    .form-group input:focus, .form-group select:focus {
        border-color: #8B0000;
        outline: none;
        background: white;
    }
    
    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }
    
    .btn-submit {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #8B0000, #C41E3A);
        border: none;
        border-radius: 12px;
        color: white;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 10px;
    }
    
    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(139, 0, 0, 0.4);
    }
    
    .login-link {
        text-align: center;
        margin-top: 20px;
        color: #666;
    }
    
    .login-link a {
        color: #8B0000;
        text-decoration: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="register-container">
    <div class="register-card">
        <div class="register-header">
            <h1>📚 Inscription Professeur</h1>
            <p>Partage ton savoir et suis tes élèves</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-row">
                <div class="form-group">
                    <label>Prénom *</label>
                    <input type="text" name="first_name" required>
                </div>
                <div class="form-group">
                    <label>Nom *</label>
                    <input type="text" name="last_name" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Nom d'utilisateur *</label>
                <input type="text" name="username" required>
            </div>
            
            <div class="form-group">
                <label>Email *</label>
                <input type="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label>Téléphone</label>
                <input type="tel" name="phone">
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Mot de passe *</label>
                    <input type="password" name="password1" required>
                </div>
                <div class="form-group">
                    <label>Confirmer *</label>
                    <input type="password" name="password2" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Matière enseignée *</label>
                <select name="subject" required>
                    <option value="">Sélectionne ta matière</option>
                    <option value="math">Mathématiques</option>
                    <option value="physics">Physique-Chimie</option>
                    <option value="french">Français</option>
                    <option value="arabic">Arabe</option>
                    <option value="english">Anglais</option>
                    <option value="history">Histoire-Géographie</option>
                    <option value="science">Sciences</option>
                    <option value="informatics">Informatique</option>
                    <option value="philosophy">Philosophie</option>
                    <option value="sports">Sport</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Établissement *</label>
                <input type="text" name="school" placeholder="Nom de ton établissement" required>
            </div>
            
            <div class="form-group">
                <label>Années d'expérience *</label>
                <input type="number" name="years_of_experience" min="0" max="50" required>
            </div>
            
            <button type="submit" class="btn-submit">📖 Créer mon compte professeur</button>
        </form>
        
        <div class="login-link">
            Déjà un compte ? <a href="{% url 'login' %}">Se connecter</a>
        </div>
    </div>
</div>
{% endblock %}
